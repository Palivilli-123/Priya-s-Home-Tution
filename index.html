<!DOCTYPE html>
<html>
<head>
    <title>Priya's Home Tuition</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f5f5f5; }
        h1 { color: #2c3e50; }
        button { padding: 10px; margin: 10px; background: #3498db; color: white; border: none; }
        form { background: white; padding: 15px; margin: 20px; border-radius: 10px; }
        input { padding: 8px; margin: 5px; width: 80%; }
    </style>
</head>
<body>

<h1>Welcome to Priya's Home Tuition</h1>
<p>Find the best tutors near you</p>

<h2>Student Registration</h2>
<form>
    <input type="text" placeholder="Student Name"><br>
    <input type="text" placeholder="Class"><br>
    <input type="text" placeholder="Location"><br>
    <input type="text" placeholder="Phone Number"><br>
    <button>Submit</button>
</form>

<h2>Tutor Registration</h2>
<form>
    <input type="text" placeholder="Tutor Name"><br>
    <input type="text" placeholder="Subject"><br>
    <input type="text" placeholder="Experience"><br>
    <input type="text" placeholder="Phone Number"><br>
    <button>Submit</button>
</form>

</body>
</html>
