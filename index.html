<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priya's Home Tuition</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
}

/* Header */
header {
  background: #4CAF50;
  color: white;
  text-align: center;
  padding: 20px;
}

/* Sections */
section {
  padding: 20px;
  text-align: center;
}

/* Button */
.whatsapp-btn {
  display: inline-block;
  padding: 12px 20px;
  background-color: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  font-size: 16px;
}

.whatsapp-btn:hover {
  background-color: #1ebe5d;
}

/* Form */
form input, form select {
  width: 80%;
  padding: 10px;
  margin: 8px;
}

button {
  padding: 10px 20px;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<header>
  <h1>Priya's Home Tuition</h1>
  <p>Find Best Tutors Near You</p>
</header>

<section>
  <h2>About Us</h2>
  <p>We connect students with experienced home tutors. Quality education at your home.</p>
</section>

<section>
  <h2>Student Registration</h2>
  <form>
    <input type="text" placeholder="Student Name" required><br>
    <input type="text" placeholder="Class" required><br>
    <input type="text" placeholder="Subject Needed" required><br>
    <input type="text" placeholder="Location" required><br>
    <button type="submit">Submit</button>
  </form>
</section>

<section>
  <h2>Tutor Registration</h2>
  <form>
    <input type="text" placeholder="Tutor Name" required><br>
    <input type="text" placeholder="Subjects" required><br>
    <input type="text" placeholder="Experience" required><br>
    <input type="text" placeholder="Location" required><br>
    <button type="submit">Register</button>
  </form>
</section>

<section id="contact">
  <h2>Contact Us</h2>
  <p>Call: 8317638144</p>
  
  <!-- WhatsApp Button -->
  <a href="https://wa.me/918317638144" class="whatsapp-btn">
    Chat on WhatsApp
  </a>
</section>

</body>
</html>
